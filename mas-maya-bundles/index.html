<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mas Maya — Sample Bundles</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Nunito:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F1F0EC;
      --ink: #1a1a18;
      --mid: #6b6b60;
      --border: #c8c7c0;
      --success: #3a6b4a;
      --error: #8b2e2e;
      --white: #ffffff;
    }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Nunito', sans-serif;
      font-weight: 200;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }
    header { text-align: center; margin-bottom: 56px; }
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 13px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 10px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 36px;
      letter-spacing: 0.01em; color: var(--ink); line-height: 1.15;
    }
    .subtitle { margin-top: 10px; font-size: 13px; font-weight: 300; color: var(--mid); letter-spacing: 0.04em; }
    .divider { width: 40px; height: 1px; background: var(--border); margin: 24px auto 0; }

    .store-section { width: 100%; max-width: 600px; margin-bottom: 40px; }
    .store-section label {
      display: block; font-size: 11px; font-weight: 300;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); margin-bottom: 10px;
    }
    .store-row { display: flex; gap: 12px; }
    .store-btn {
      flex: 1; border: 1px solid var(--border); background: var(--white);
      padding: 14px 0; font-family: 'Nunito', sans-serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.1em; color: var(--mid);
      cursor: pointer; border-radius: 0; transition: all 0.12s; text-align: center;
    }
    .store-btn:hover { border-color: var(--ink); color: var(--ink); }
    .store-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    .bundles {
      width: 100%; max-width: 600px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 16px; margin-bottom: 32px;
    }
    .bundle-card {
      border: 1px solid var(--border); background: var(--white);
      padding: 28px 24px 24px; display: flex; flex-direction: column; gap: 16px;
    }
    .bundle-card.featured { border-color: var(--ink); }
    .bundle-label { font-size: 10px; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); }
    .bundle-name { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 20px; color: var(--ink); line-height: 1.2; }
    .bundle-count { font-size: 12px; font-weight: 300; color: var(--mid); }
    .create-btn {
      border: 1px solid var(--ink); background: var(--ink); color: var(--cream);
      padding: 12px 0; font-family: 'Nunito', sans-serif; font-weight: 300;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; border-radius: 0; transition: all 0.15s; width: 100%;
    }
    .create-btn:hover:not(:disabled) { background: var(--cream); color: var(--ink); }
    .create-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .log-wrap { width: 100%; max-width: 600px; }
    #log { border: 1px solid var(--border); background: var(--white); padding: 16px; font-size: 12px; font-weight: 300; line-height: 1.9; color: var(--ink); display: none; }
    #log.visible { display: block; }
    .log-entry { display: flex; align-items: baseline; gap: 8px; }
    .log-entry.ok .dot { color: var(--success); }
    .log-entry.err .dot { color: var(--error); }
    .log-entry.err { color: var(--error); }
    .log-entry a { color: var(--ink); }

    @media (max-width: 600px) {
      .bundles { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Mas Maya</div>
  <h1>Sample Bundles</h1>
  <p class="subtitle">Create a draft order with all sample SKUs in one click</p>
  <div class="divider"></div>
</header>

<div class="store-section">
  <label>Select store</label>
  <div class="store-row">
    <button class="store-btn" data-store="com" onclick="selectStore(this)">COM</button>
    <button class="store-btn" data-store="uk" onclick="selectStore(this)">UK</button>
  </div>
</div>

<div class="bundles">
  <div class="bundle-card">
    <div>
      <div class="bundle-label">Bundle 1</div>
      <div class="bundle-name">Coating<br>Samples</div>
    </div>
    <div class="bundle-count">All MMCPlaq SKUs · 1 unit each</div>
    <button class="create-btn" id="btnCoating" onclick="createBundle('coating')">Create Draft Order</button>
  </div>
  <div class="bundle-card">
    <div>
      <div class="bundle-label">Bundle 2</div>
      <div class="bundle-name">Lime Wash<br>Samples</div>
    </div>
    <div class="bundle-count">All MMLWSamp SKUs · 1 unit each</div>
    <button class="create-btn" id="btnLime" onclick="createBundle('lime')">Create Draft Order</button>
  </div>
  <div class="bundle-card featured">
    <div>
      <div class="bundle-label">Bundle 3</div>
      <div class="bundle-name">Coating &amp;<br>Lime Wash</div>
    </div>
    <div class="bundle-count">All sample SKUs · 1 unit each</div>
    <button class="create-btn" id="btnBoth" onclick="createBundle('both')">Create Draft Order</button>
  </div>
</div>

<div class="log-wrap">
  <div id="log"></div>
</div>

<script>
  let selectedStore = null;

  function selectStore(btn) {
    document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStore = btn.dataset.store;
  }

  function log(msg, type, href) {
    const logEl = document.getElementById('log');
    logEl.classList.add('visible');
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + (type || '');
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.textContent = type === 'ok' ? '✓' : type === 'err' ? '✗' : '·';
    entry.appendChild(dot);
    if (href) {
      const a = document.createElement('a');
      a.href = href; a.target = '_blank'; a.textContent = msg;
      entry.appendChild(a);
    } else {
      entry.appendChild(document.createTextNode(msg));
    }
    logEl.appendChild(entry);
  }

  async function createBundle(type) {
    if (!selectedStore) { alert('Please select COM or UK first.'); return; }
    const btnMap = { coating: 'btnCoating', lime: 'btnLime', both: 'btnBoth' };
    const btn = document.getElementById(btnMap[type]);
    btn.disabled = true;
    btn.textContent = 'Working…';
    const labelMap = { coating: 'Coating', lime: 'Lime Wash', both: 'Coating & Lime Wash' };
    log('Creating ' + labelMap[type] + ' bundle for ' + selectedStore.toUpperCase() + '…');
    try {
      const res = await fetch('/.netlify/functions/shopify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ store: selectedStore, bundleType: type }),
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        log(data.error || 'Something went wrong.', 'err');
      } else {
        log('Draft order created: ' + data.draftName, 'ok', data.adminUrl);
        log('Opening Shopify Admin…', 'ok');
        window.open(data.adminUrl, '_blank');
      }
    } catch (err) {
      log('Network error: ' + err.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Draft Order';
    }
  }
</script>
</body>
</html>
